<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://iambrocco.github.io/global/style.css"
    />
    <link
      rel="stylesheet"
      href="https://iambrocco.github.io/global/grids.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Brottoli's Dashboard</title>
  </head>
  <body>
    <div class="head">
      <h3>Welcome to the dashboard,</h3>
      <div>
        <img src="" id="avatar" />
        <div id="name"></div>
      </div>
      <a href="./">Logout</a>
    </div>
    <div class="body">
      <div id="login">

          <a
            href="https://discord.com/api/oauth2/authorize?client_id=930670275106844682&redirect_uri=https%3A%2F%2Fiambrocco.github.io%2FBrottoli%2Fdashboard&response_type=token&scope=identify%20guilds"
          >
            <span>Login With Discord to Access the Dashboard</span>
          </a>

      </div>
      <div class="dash">
        <div class="guilds">
          <div class="text"><h3>1. Select a guild/server to manage:</h3></div>
          <br />
        </div>
        <div class="manage">
          <div class="self">
            <h3>Self Options</h3>
            <h5>Your Global Preferences</h5>
            <div id="global" class="btn">Manage</div>
          </div>
          <div class="guildOptions">
            <h3>Guild Options</h3>
            <h5>Your Guild-Specific Preferences</h5>
            <div id="specific" class="btn">Manage</div>
          </div>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
